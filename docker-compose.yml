version: "3.9"

services:
  apu-forecasting:
    build: .
    container_name: apu_demand_forecast
    ports:
      - "8000:8000"
    volumes:
      - ./models:/app/models       # persist trained model artifacts
      - ./static:/app/static       # persist EDA plots
      - ./data:/app/data           # mount data directory
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
